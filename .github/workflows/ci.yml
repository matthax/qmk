name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - run: bun install

      - run: bun run test

      - name: Generate lcov report
        run: bun run cov:send

      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
