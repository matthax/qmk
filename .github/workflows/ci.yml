name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Generate lcov report
        run: npm run cov:send

      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
